spring:
  application:
    name: notification
  kafka:
    bootstrap:
      servers: localhost:${KAFKA_PORT}
    consumer:
      group-id: consumer-group-v1
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      topic:
        kafka-deposit: "deposit-created"
        kafka-transfer: "transfer-created"
        kafka-signin: "signin-notification"
        kafka-signup: "signup-notification"

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_NOTIFICATION}
    password: ${EMAIL_SECRET}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT}